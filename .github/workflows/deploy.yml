name: CI/CD - Build, Test & Deploy

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven
  JAVA_VERSION: '17'
  PROD_CONTAINER_NAME: spring-maven-app
  PROD_BACKUP_CONTAINER_NAME: spring-maven-app-backup
  PROD_PORT: '8080'
  STAGING_CONTAINER_NAME: spring-maven-staging
  STAGING_BACKUP_CONTAINER_NAME: spring-maven-staging-backup
  STAGING_PORT: '8081'

jobs:
  test:
    name: Tests Maven
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Execution des tests
        run: mvn test -B --no-transfer-progress

  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generation des metadonnees
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Scan securite Trivy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Scan image Docker avec Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

  deploy-staging:
    name: Deploiement Staging
    runs-on: self-hosted
    needs: security-scan
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: http://192.168.118.130:8081

    steps:
      - name: Connexion a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image Docker
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven:latest

      - name: Deploiement staging avec rollback
        shell: bash
        run: |
          set -e

          docker rm -f $STAGING_BACKUP_CONTAINER_NAME 2>/dev/null || true

          if docker ps -a --format '{{.Names}}' | grep -q "^$STAGING_CONTAINER_NAME$"; then
            docker stop $STAGING_CONTAINER_NAME || true
            docker rename $STAGING_CONTAINER_NAME $STAGING_BACKUP_CONTAINER_NAME
          fi

          docker run -d \
            --name $STAGING_CONTAINER_NAME \
            --restart unless-stopped \
            -p $STAGING_PORT:8080 \
            -e SPRING_PROFILES_ACTIVE=staging \
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven:latest

          success=0
          for i in {1..12}; do
            if curl -fsS http://localhost:8081/ > /dev/null; then
              success=1
              break
            fi
            sleep 5
          done

          if [ "$success" -eq 1 ]; then
            echo "Deploiement staging reussi"
            docker rm -f $STAGING_BACKUP_CONTAINER_NAME 2>/dev/null || true
            docker image prune -f
            exit 0
          fi

          echo "Echec du deploiement staging, rollback en cours"
          docker logs $STAGING_CONTAINER_NAME || true
          docker rm -f $STAGING_CONTAINER_NAME || true

          if docker ps -a --format '{{.Names}}' | grep -q "^$STAGING_BACKUP_CONTAINER_NAME$"; then
            docker rename $STAGING_BACKUP_CONTAINER_NAME $STAGING_CONTAINER_NAME
            docker start $STAGING_CONTAINER_NAME
            echo "Rollback staging effectue avec succes"
            exit 1
          fi

          echo "Aucun conteneur staging precedent disponible pour rollback"
          exit 1

  deploy-production:
    name: Deploiement Production
    runs-on: self-hosted
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://192.168.118.130:8080

    steps:
      - name: Connexion a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image Docker
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven:latest

      - name: Deploiement production avec rollback
        shell: bash
        run: |
          set -e

          docker rm -f $PROD_BACKUP_CONTAINER_NAME 2>/dev/null || true

          if docker ps -a --format '{{.Names}}' | grep -q "^$PROD_CONTAINER_NAME$"; then
            docker stop $PROD_CONTAINER_NAME || true
            docker rename $PROD_CONTAINER_NAME $PROD_BACKUP_CONTAINER_NAME
          fi

          docker run -d \
            --name $PROD_CONTAINER_NAME \
            --restart unless-stopped \
            -p $PROD_PORT:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven:latest

          success=0
          for i in {1..12}; do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              success=1
              break
            fi
            sleep 5
          done

          if [ "$success" -eq 1 ]; then
            echo "Deploiement production reussi"
            docker rm -f $PROD_BACKUP_CONTAINER_NAME 2>/dev/null || true
            docker image prune -f
            exit 0
          fi

          echo "Echec du deploiement production, rollback en cours"
          docker logs $PROD_CONTAINER_NAME || true
          docker rm -f $PROD_CONTAINER_NAME || true

          if docker ps -a --format '{{.Names}}' | grep -q "^$PROD_BACKUP_CONTAINER_NAME$"; then
            docker rename $PROD_BACKUP_CONTAINER_NAME $PROD_CONTAINER_NAME
            docker start $PROD_CONTAINER_NAME
            echo "Rollback production effectue avec succes"
            exit 1
          fi

          echo "Aucun conteneur production precedent disponible pour rollback"
          exit 1

  notify-failure:
    name: Notification echec par email
    runs-on: ubuntu-latest
    needs: [test, build-and-push, security-scan, deploy-staging, deploy-production]
    if: ${{ always() && (needs.test.result == 'failure' || needs.build-and-push.result == 'failure' || needs.security-scan.result == 'failure' || needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure') }}

    steps:
      - name: Envoyer un email d'echec
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[ECHEC CI/CD] spring-maven-cicd"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          body: |
            Le pipeline CI/CD a echoue.

            Depot : ${{ github.repository }}
            Branche : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Workflow : ${{ github.workflow }}
            Run ID : ${{ github.run_id }}

            Resultats :
            - test = ${{ needs.test.result }}
            - build-and-push = ${{ needs.build-and-push.result }}
            - security-scan = ${{ needs.security-scan.result }}
            - deploy-staging = ${{ needs.deploy-staging.result }}
            - deploy-production = ${{ needs.deploy-production.result }}

            Consulte les logs du workflow dans GitHub Actions.