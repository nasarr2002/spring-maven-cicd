name: CI/CD - Build, Test & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven
  JAVA_VERSION: '17'
  CONTAINER_NAME: spring-maven-app
  BACKUP_CONTAINER_NAME: spring-maven-app-backup
  APP_PORT: '8080'

jobs:
  test:
    name: Tests Maven
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Execution des tests
        run: mvn test -B --no-transfer-progress

  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generation des metadonnees
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Scan securite Trivy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Scan image Docker avec Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven:latest
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  deploy:
    name: Deploiement Production
    runs-on: self-hosted
    needs: security-scan
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Connexion a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image Docker
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven:latest

      - name: Deploiement avec rollback
        shell: bash
        run: |
          set -e

          # Nettoyage d'une ancienne sauvegarde si elle existe
          docker rm -f $BACKUP_CONTAINER_NAME 2>/dev/null || true

          # Si le conteneur actif existe, on le renomme comme sauvegarde
          if docker ps -a --format '{{.Names}}' | grep -q "^$CONTAINER_NAME$"; then
            docker stop $CONTAINER_NAME || true
            docker rename $CONTAINER_NAME $BACKUP_CONTAINER_NAME
          fi

          # Lancer le nouveau conteneur
          docker run -d \
            --name $CONTAINER_NAME \
            --restart unless-stopped \
            -p $APP_PORT:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven:latest

          # Vérification applicative
          success=0
          for i in {1..12}; do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              success=1
              break
            fi
            sleep 5
          done

          # Si succès: on supprime la sauvegarde
          if [ "$success" -eq 1 ]; then
            echo "Deploiement reussi"
            docker rm -f $BACKUP_CONTAINER_NAME 2>/dev/null || true
            docker image prune -f
            exit 0
          fi

          # Sinon: rollback
          echo "Echec du nouveau deploiement, rollback en cours"
          docker logs $CONTAINER_NAME || true
          docker rm -f $CONTAINER_NAME || true

          if docker ps -a --format '{{.Names}}' | grep -q "^$BACKUP_CONTAINER_NAME$"; then
            docker rename $BACKUP_CONTAINER_NAME $CONTAINER_NAME
            docker start $CONTAINER_NAME
            echo "Rollback effectue avec succes"
            exit 1
          fi

          echo "Aucun conteneur precedent disponible pour rollback"
          exit 1

  notify-failure:
    name: Notification echec par email
    runs-on: ubuntu-latest
    needs: [test, build-and-push, security-scan, deploy]
    if: ${{ always() && (needs.test.result == 'failure' || needs.build-and-push.result == 'failure' || needs.security-scan.result == 'failure' || needs.deploy.result == 'failure') }}

    steps:
      - name: Envoyer un email d'echec
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[ECHEC CI/CD] spring-maven-cicd"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          body: |
            Le pipeline CI/CD a echoue.

            Depot : ${{ github.repository }}
            Branche : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Workflow : ${{ github.workflow }}
            Run ID : ${{ github.run_id }}

            Resultats :
            - test = ${{ needs.test.result }}
            - build-and-push = ${{ needs.build-and-push.result }}
            - security-scan = ${{ needs.security-scan.result }}
            - deploy = ${{ needs.deploy.result }}

            Consulte les logs du workflow dans GitHub Actions.